<!DOCTYPE html>
<html>
    <head>
        <meta chaset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact</title>
        <link rel="stylesheet" href="contact.css">
        <link rel="icon" href="images/Effective_accelerationism_icon.svg">
        <meta name="description" content="a contact section of the random page">
    </head>
    <body>
        <header>
            <h1>Random page</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>
        <div class="clearfix"></div>
        <main>
            <section id="form">
                <form>
                    <label for="fname">Full name:</label>
                    <input type="text" id="fname" placeholder="(e.g., John Doe)">
                    <br>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="(e.g., johndoe34@email.com)">
                    <br>
                    <label for="fav-color">Select your favorite color:</label>
                    <input type="color" id="fav-color" value="rebeccapurple">
                    <br>
                    <label for="file">Select a file:</label>
                    <input type="file" id="file">
                    <br>
                    <label for="date">Current date:</label>
                    <input type="date" id="date">
                    <br>
                    <label for="message">Message</label>
                    <textarea id="message" rows="4" cols="22"></textarea>
                    <br>
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </form>
            </section>
        </main>
        <footer>
            <p> randompage.com </p>
        </footer>
    </body>
</html>
